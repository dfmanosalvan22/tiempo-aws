<VirtualHost *:80>
    ServerName dfmanosalvan.es
    ServerAlias www.dfmanosalvan.es
    Redirect permanent / https://dfmanosalvan.es/
</VirtualHost>

<VirtualHost *:443>
    ServerName dfmanosalvan.es
    ServerAlias www.dfmanosalvan.es
    DocumentRoot /var/www/html
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/dfmanosalvan.es/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/dfmanosalvan.es/privkey.pem
    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>