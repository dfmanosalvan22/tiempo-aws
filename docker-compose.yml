services:

  php_app:
    build: .
    container_name: tiempo_php
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

  mariadb:
    image: mariadb:10.11
    container_name: tiempo_bd
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE:      tiempo_app
      MARIADB_USER:          tiempo_user
      MARIADB_PASSWORD:      tiempo_pass
    volumes:
      - datos_mariadb:/var/lib/mysql
      - ./DB/bd.sql:/docker-entrypoint-initdb.d/bd.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  datos_mariadb:
